<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX-02 — STRATEGIC SIMULATION GRID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --panel: #0a0a0a;
            --text: #e5e5e5;
            --text-muted: #737373;
            --accent: #22d3ee;
            --accent-warm: #eab308;
            --success: #4ade80;
            --border: #262626;
            --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
            --font-body: 'Instrument Sans', system-ui, sans-serif;
        }

        html.light {
            --bg: #f8f7f4;
            --panel: #ffffff;
            --text: #111111;
            --text-muted: #52525b;
            --accent: #0284c8;
            --accent-warm: #854d0e;
            --success: #15803d;
            --border: #d1d5db;
        }

        body {
            margin: 0;
            background: var(--bg);
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 18px 18px;
            color: var(--text);
            font-family: var(--font-body);
            padding: 24px 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .instrument {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .instrument-header {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1.5px;
            padding: 9px 14px 8px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
        }

        .theme-toggle {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 1px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 1px 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.2);
        }

        .matrix-wrapper {
            padding: 22px 20px 14px;
            background: var(--bg);
        }

        .matrix-label {
            font-family: var(--font-mono);
            font-size: 8px;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            background: #0a0a0a;
            padding: 5px;
            border: 1px solid #1f1f1f;
        }

        .cell {
            aspect-ratio: 1;
            background: #121212;
            border: 1px solid #262626;
            font-family: var(--font-mono);
            font-size: 42px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #e5e5e5;
            transition: all 0.1s ease;
            user-select: none;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .cell:hover:not(.filled) {
            background: #1a1a1a;
            border-color: #3f3f3f;
        }

        .cell.x { color: var(--accent); }
        .cell.o { color: var(--accent-warm); }

        .cell.win {
            background: #052e16;
            border-color: var(--success);
            color: var(--success);
            box-shadow: 0 0 0 1px rgba(74,222,128,0.3);
        }

        .status-bar {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 11px 14px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
        }

        .controls {
            padding: 12px 14px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1px;
            padding: 9px 0;
            background: #121212;
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #1a1a1a;
            border-color: #3f3f3f;
        }

        .btn.primary {
            background: #052e16;
            border-color: #166534;
            color: var(--success);
        }

        .scores {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 9px;
            padding: 8px 14px 10px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            color: var(--text-muted);
        }

        .score {
            text-align: center;
        }

        .score-value {
            font-size: 13px;
            color: var(--text);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div><span style="color:#eab308">MATRIX-02</span> / STRATEGIC SIMULATION GRID</div>
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="status">
                    <span class="status-dot"></span>
                    <span>MINIMAX ACTIVE</span>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">LIGHT</button>
            </div>
        </div>

        <div class="matrix-wrapper">
            <div class="matrix-label">9-CELL TACTICAL FIELD — PERFECT PLAY ENFORCED</div>
            <div class="matrix" id="board"></div>
        </div>

        <div class="status-bar">
            <div id="status">YOUR MOVE (X)</div>
            <div style="font-size:9px; color:#52525b">HUMAN vs OPTIMAL</div>
        </div>

        <div class="scores">
            <div class="score">
                <div>YOU</div>
                <div class="score-value" id="score-x">0</div>
            </div>
            <div class="score">
                <div>DRAW</div>
                <div class="score-value" id="score-draw">0</div>
            </div>
            <div class="score">
                <div>MATRIX</div>
                <div class="score-value" id="score-o">0</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetGame()" class="btn">NEW GAME</button>
            <button onclick="resetScores()" class="btn">RESET SCORES</button>
        </div>
    </div>

    <div style="text-align:center; margin-top:16px; font-family: var(--font-mono); font-size:8px; letter-spacing:1px; color:#52525b;">
        GROK FIELD LOG • SPECIMEN-02 • THE MACHINE NEVER LOSES
    </div>

    <script>
        // === Minimax Tic Tac Toe - preserved logic, new brutalist presentation ===
        const WIN_LINES = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        let boardState = Array(9).fill('');
        let currentPlayer = 'X';
        let gameOver = false;
        let scores = { X: 0, O: 0, draw: 0 };
        let cells = [];

        function loadScores() {
            try {
                const s = localStorage.getItem('matrix02-scores');
                if (s) scores = JSON.parse(s);
            } catch(e){}
        }

        function saveScores() {
            try { localStorage.setItem('matrix02-scores', JSON.stringify(scores)); } catch(e){}
        }

        function updateScores() {
            document.getElementById('score-x').textContent = scores.X;
            document.getElementById('score-draw').textContent = scores.draw;
            document.getElementById('score-o').textContent = scores.O;
            saveScores();
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleMove(i));
                boardEl.appendChild(cell);
            }
            cells = boardEl.querySelectorAll('.cell');
        }

        function updateBoard() {
            cells.forEach((cell, i) => {
                const val = boardState[i];
                cell.textContent = val;
                cell.classList.remove('x', 'o', 'win', 'filled');
                if (val) {
                    cell.classList.add(val.toLowerCase(), 'filled');
                }
            });
        }

        function clearHighlights() {
            cells.forEach(c => c.classList.remove('win'));
        }

        function highlightWin(line) {
            if (!line) return;
            line.forEach(idx => cells[idx] && cells[idx].classList.add('win'));
        }

        function checkGameState(board) {
            for (const line of WIN_LINES) {
                const [a,b,c] = line;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return { winner: board[a], line };
                }
            }
            return { winner: null, line: null };
        }

        function isFull(board) {
            return board.every(c => c !== '');
        }

        function minimax(board, isMax) {
            const { winner } = checkGameState(board);
            if (winner === 'O') return 10;
            if (winner === 'X') return -10;
            if (isFull(board)) return 0;

            if (isMax) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) if (board[i] === '') {
                    board[i] = 'O';
                    best = Math.max(best, minimax(board, false));
                    board[i] = '';
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) if (board[i] === '') {
                    board[i] = 'X';
                    best = Math.min(best, minimax(board, true));
                    board[i] = '';
                }
                return best;
            }
        }

        function getBestMove(board) {
            let bestScore = -Infinity;
            let bestMoves = [];
            for (let i = 0; i < 9; i++) if (board[i] === '') {
                board[i] = 'O';
                const score = minimax(board, false);
                board[i] = '';
                if (score > bestScore) {
                    bestScore = score;
                    bestMoves = [i];
                } else if (score === bestScore) {
                    bestMoves.push(i);
                }
            }
            return bestMoves[Math.floor(Math.random() * bestMoves.length)];
        }

        function updateStatus(msg = null) {
            const el = document.getElementById('status');
            if (msg) {
                el.textContent = msg;
                el.style.color = msg.includes('MATRIX') ? 'var(--accent-warm)' : (msg.includes('DRAW') ? '#737373' : 'var(--success)');
            } else if (!gameOver) {
                el.textContent = currentPlayer === 'X' ? 'YOUR MOVE (X)' : 'MATRIX THINKING...';
                el.style.color = currentPlayer === 'X' ? 'var(--accent)' : 'var(--accent-warm)';
            }
        }

        function makeMove(index, player) {
            if (gameOver || boardState[index] !== '') return false;

            boardState[index] = player;
            updateBoard();

            const state = checkGameState(boardState);

            if (state.winner) {
                gameOver = true;
                highlightWin(state.line);
                scores[state.winner]++;
                updateScores();
                updateStatus(state.winner === 'X' ? 'YOU WIN' : 'MATRIX WINS');
            } else if (isFull(boardState)) {
                gameOver = true;
                scores.draw++;
                updateScores();
                updateStatus('DRAW — OPTIMAL PLAY');
            } else {
                currentPlayer = player === 'X' ? 'O' : 'X';
                updateStatus();
                if (currentPlayer === 'O') {
                    setTimeout(() => {
                        if (!gameOver) computerMove();
                    }, 380);
                }
            }
            return true;
        }

        function handleMove(index) {
            if (gameOver || currentPlayer !== 'X') return;
            if (makeMove(index, 'X') && !gameOver) {
                currentPlayer = 'O';
                updateStatus();
                setTimeout(() => {
                    if (!gameOver) computerMove();
                }, 380);
            }
        }

        function computerMove() {
            if (gameOver) return;
            const move = getBestMove(boardState);
            if (move > -1) makeMove(move, 'O');
        }

        function resetGame(keepScores = true) {
            boardState = Array(9).fill('');
            currentPlayer = 'X';
            gameOver = false;
            clearHighlights();
            updateBoard();
            updateStatus();
        }

        function resetScores() {
            scores = { X: 0, O: 0, draw: 0 };
            updateScores();
        }

        function setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                if (gameOver && (e.key.toLowerCase() === 'r' || e.key === ' ')) {
                    e.preventDefault();
                    resetGame();
                    return;
                }
                const num = parseInt(e.key);
                if (num >= 1 && num <= 9 && !gameOver && currentPlayer === 'X') {
                    handleMove(num - 1);
                }
                if (e.key.toLowerCase() === 'r' && !gameOver) {
                    resetGame();
                }
            });
        }

        // Theme toggle
        function applyTheme(theme) {
            const html = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            if (theme === 'light') {
                html.classList.add('light');
                if (btn) btn.textContent = 'DARK';
            } else {
                html.classList.remove('light');
                if (btn) btn.textContent = 'LIGHT';
            }
            localStorage.setItem('grok-theme', theme);
        }
        function initTheme() {
            const btn = document.getElementById('theme-toggle');
            let saved = localStorage.getItem('grok-theme');
            if (!saved) {
                saved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            }
            applyTheme(saved);
            if (btn) {
                btn.addEventListener('click', () => {
                    const isLight = document.documentElement.classList.contains('light');
                    applyTheme(isLight ? 'dark' : 'light');
                });
            }
        }

        function initMatrix() {
            initTheme();
            loadScores();
            updateScores();
            createBoard();
            updateBoard();
            updateStatus();
            setupKeyboard();

            console.log('%c[MATRIX-02] Strategic Simulation Grid initialized. Minimax locked.', 'color:#52525b');
        }

        window.onload = initMatrix;
        window.__matrix02 = { reset: () => resetGame(), getState: () => ({ boardState, currentPlayer, gameOver, scores }) };
    </script>
</body>
</html>
