<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPOUND-46 — DAITYA AI ACADEMY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../diatya-ai-icon.svg">
    <style>
        :root { --bg:#000000; --panel:#1c1c1e; --surface:#2c2c2e; --text:#f5f5f7; --text-muted:#8e8e93; --accent:#0a84ff; --border:#38383a; --font-mono:'IBM Plex Mono',ui-monospace,monospace; --font-body:'Instrument Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif; }
        html.light { --bg:#f2f2f7; --panel:#ffffff; --surface:#ffffff; --text:#000000; --text-muted:#6e6e73; --accent:#007aff; --border:#c6c6c8; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); padding:24px 16px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .instrument { width:100%; max-width:380px; background:var(--panel); border:1px solid var(--border); border-radius:24px; overflow:hidden; box-shadow:0 20px 50px-12px rgba(0,0,0,0.35); }
        .instrument-header { font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; padding:12px 18px; background:color-mix(in srgb, var(--panel)95%,transparent); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; text-transform:uppercase; }
        .theme-toggle { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; background:none; border:1px solid var(--border); color:var(--text-muted); padding:2px 8px; border-radius:6px; cursor:pointer; text-transform:uppercase; }
        .inps { padding:14px 18px 6px; background:var(--bg); display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .field label { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:3px; }
        .field input { font-family:var(--font-mono); font-size:15px; width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:10px; }
        .out { padding:14px 18px; background:var(--bg); border-bottom:1px solid var(--border); }
        .row { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
        .row .l { color:var(--text-muted); }
        .row .v { font-family:var(--font-mono); font-weight:600; }
        .big { font-size:21px; color:var(--accent); }
        .footer { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-align:center; padding-top:20px; }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div style="display:flex;align-items:center;gap:8px;">
                <a href="../index.html"><img src="../diatya-ai-icon.svg" alt="DaityaAI" style="height:28px;width:auto;vertical-align:middle;"></a>
                <span><span style="color:var(--accent)">COMPOUND-46</span> / COMPOUND INTEREST</span>
            </div>
            <button id="theme-toggle" class="theme-toggle">LIGHT</button>
        </div>

        <div class="inps">
            <div class="field"><label>PRINCIPAL (₹)</label><input id="p" type="number" value="500000"></div>
            <div class="field"><label>ANNUAL RATE (%)</label><input id="r" type="number" value="8"></div>
            <div class="field"><label>YEARS</label><input id="y" type="number" value="10"></div>
            <div class="field"><label>MONTHLY ADDITION (₹)</label><input id="add" type="number" value="5000"></div>
            <div class="field"><label>INFLATION (%)</label><input id="inf" type="number" value="5"></div>
        </div>

        <div class="out">
            <div class="row"><div class="l">FUTURE VALUE</div><div id="fv" class="v big">—</div></div>
            <div class="row"><div class="l">TOTAL CONTRIBUTED</div><div id="contrib" class="v">—</div></div>
            <div class="row"><div class="l">INTEREST EARNED</div><div id="int" class="v">—</div></div>
        </div>
    </div>
    <div class="footer">DAITYA AI ACADEMY • SPECIMEN-46 • LEARN. BUILD. LAUNCH.</div>

    <script>
        function calc() {
            const P = parseFloat(document.getElementById('p').value) || 0;
            const r = parseFloat(document.getElementById('r').value) / 100;
            const y = parseFloat(document.getElementById('y').value) || 0;
            const add = parseFloat(document.getElementById('add').value) || 0;
            const inf = parseFloat(document.getElementById('inf').value) / 100;

            const n = y * 12;
            const mr = r / 12;

            let fv = P * Math.pow(1 + mr, n);
            let contrib = P;

            for (let i = 0; i < n; i++) {
                fv = fv * (1 + mr) + add;
                contrib += add;
            }

            const interest = fv - contrib;

            document.getElementById('fv').textContent = '₹' + Math.round(fv).toLocaleString('en-IN');
            document.getElementById('contrib').textContent = '₹' + Math.round(contrib).toLocaleString('en-IN');
            document.getElementById('int').textContent = '₹' + Math.round(interest).toLocaleString('en-IN');
        }

        function setup() {
            ['p','r','y','add','inf'].forEach(id => document.getElementById(id).addEventListener('input', calc));
            calc();
        }

        function applyTheme(th){const h=document.documentElement,b=document.getElementById('theme-toggle');if(th==='light'){h.classList.add('light');if(b)b.textContent='DARK';}else{h.classList.remove('light');if(b)b.textContent='LIGHT';}localStorage.setItem('daitya-theme',th);}
        function initTheme(){const b=document.getElementById('theme-toggle');let s=localStorage.getItem('daitya-theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');applyTheme(s);if(b)b.addEventListener('click',()=>applyTheme(document.documentElement.classList.contains('light')?'dark':'light'));}

        function init(){initTheme();setup();}
        window.onload=init;
    </script>
</body>
</html>
