<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE-13 — DAITYA AI ACADEMY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../diatya-ai-icon.svg">
    <style>
        :root {
            --bg: #000000; --panel: #1c1c1e; --surface: #2c2c2e; --paper: #2c2c2e;
            --text: #f5f5f7; --text-muted: #8e8e93; --accent: #0a84ff; --accent-warm: #ff9f0a;
            --success: #30d158; --border: #38383a;
            --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
            --font-body: 'Instrument Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            --radius: 18px;
        }
        html.light {
            --bg: #f2f2f7; --panel: #ffffff; --surface: #ffffff; --paper: #ffffff;
            --text: #000000; --text-muted: #6e6e73; --accent: #007aff; --accent-warm: #ff9500;
            --success: #34c759; --border: #c6c6c8;
        }
        body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); padding:24px 16px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .instrument { width:100%; max-width:460px; background:var(--panel); border:1px solid var(--border); border-radius:24px; overflow:hidden; box-shadow:0 20px 50px -12px rgba(0,0,0,0.35); }
        .instrument-header { font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; padding:12px 18px; background:color-mix(in srgb, var(--panel) 95%, transparent); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; text-transform:uppercase; }
        .theme-toggle { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; background:none; border:1px solid var(--border); color:var(--text-muted); padding:2px 8px; border-radius:6px; cursor:pointer; text-transform:uppercase; }
        .status { display:flex; align-items:center; gap:6px; color:var(--success); }
        .status-dot { width:6px; height:6px; background:var(--success); border-radius:50%; box-shadow:0 0 0 2px rgba(48,209,88,.25); }
        .game-area { padding:18px; background:var(--bg); display:flex; justify-content:center; }
        canvas { border:1px solid var(--border); border-radius:8px; background:#0a0a0c; image-rendering: pixelated; }
        .hud { padding:12px 18px; background:var(--bg); border-top:1px solid var(--border); display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:12px; }
        .controls { padding:12px 18px 16px; background:var(--bg); border-top:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap; }
        .btn { font-family:var(--font-mono); font-size:11px; letter-spacing:0.5px; padding:8px 16px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; }
        .btn.primary { background:color-mix(in srgb, var(--surface) 65%, var(--accent) 20%); border-color:var(--accent); }
        .footer { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-align:center; padding-top:20px; }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div style="display:flex; align-items:center; gap:8px;">
                <a href="../index.html" title="DaityaAI Home"><img src="../diatya-ai-icon.svg" alt="DaityaAI" style="height:28px; width:auto; vertical-align:middle;"></a>
                <span><span style="color:var(--accent)">SNAKE-13</span> / SNAKE ENGINE</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="status"><span class="status-dot"></span><span>OPERATIONAL</span></div>
                <button id="theme-toggle" class="theme-toggle">LIGHT</button>
            </div>
        </div>

        <div class="game-area">
            <canvas id="game" width="400" height="400"></canvas>
        </div>

        <div class="hud">
            <div>SCORE <span id="score" style="color:var(--accent); font-weight:600;">0000</span></div>
            <div>HIGH <span id="high" style="color:var(--text-muted);">0000</span></div>
            <div id="status">PRESS SPACE</div>
        </div>

        <div class="controls">
            <button id="start" class="btn primary">START / PAUSE</button>
            <button id="reset" class="btn">RESET</button>
            <span style="font-family:var(--font-mono); font-size:9px; color:var(--text-muted); align-self:center; margin-left:auto;">ARROWS / WASD • SPACE</span>
        </div>
    </div>

    <div class="footer">
        DAITYA AI ACADEMY • SPECIMEN-13 • LEARN. BUILD. LAUNCH.
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });
        const GRID = 20;
        const SIZE = 20;

        let snake = [{x:10,y:10}];
        let dir = {x:1, y:0};
        let food = {x:15, y:10};
        let score = 0;
        let high = 0;
        let running = false;
        let interval = null;

        const scoreEl = document.getElementById('score');
        const highEl = document.getElementById('high');
        const statusEl = document.getElementById('status');

        function loadHigh() {
            high = parseInt(localStorage.getItem('daitya-snake-high') || '0');
            highEl.textContent = String(high).padStart(4,'0');
        }
        function saveHigh() {
            if (score > high) {
                high = score;
                localStorage.setItem('daitya-snake-high', high);
                highEl.textContent = String(high).padStart(4,'0');
            }
        }

        function reset() {
            snake = [{x:10,y:10}];
            dir = {x:1, y:0};
            food = spawnFood();
            score = 0;
            scoreEl.textContent = '0000';
            statusEl.textContent = 'PRESS SPACE';
            draw();
        }

        function spawnFood() {
            let f;
            do {
                f = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
            } while (snake.some(s => s.x === f.x && s.y === f.y));
            return f;
        }

        function draw() {
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // grid
            ctx.strokeStyle = '#1f1f23';
            ctx.lineWidth = 1;
            for (let i=0; i<=GRID; i++) {
                ctx.beginPath();
                ctx.moveTo(i*SIZE, 0);
                ctx.lineTo(i*SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i*SIZE);
                ctx.lineTo(canvas.width, i*SIZE);
                ctx.stroke();
            }

            // snake
            ctx.fillStyle = '#22d3ee';
            snake.forEach((s, i) => {
                const x = s.x * SIZE;
                const y = s.y * SIZE;
                ctx.fillRect(x+1, y+1, SIZE-2, SIZE-2);
                if (i === 0) {
                    ctx.fillStyle = '#0a84ff';
                    ctx.fillRect(x+4, y+4, SIZE-8, SIZE-8);
                    ctx.fillStyle = '#22d3ee';
                }
            });

            // food
            ctx.fillStyle = '#30d158';
            ctx.fillRect(food.x*SIZE + 3, food.y*SIZE + 3, SIZE-6, SIZE-6);
        }

        function step() {
            if (!running) return;

            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

            // wall
            if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) { endGame(); return; }
            // self
            if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = String(score).padStart(4,'0');
                food = spawnFood();
            } else {
                snake.pop();
            }
            draw();
        }

        function endGame() {
            running = false;
            clearInterval(interval);
            statusEl.textContent = 'GAME OVER';
            saveHigh();
            setTimeout(() => { statusEl.textContent = 'PRESS SPACE TO RESTART'; }, 800);
        }

        function toggle() {
            if (!running) {
                running = true;
                statusEl.textContent = 'RUNNING';
                interval = setInterval(step, 120);
            } else {
                running = false;
                clearInterval(interval);
                statusEl.textContent = 'PAUSED';
            }
        }

        function changeDir(newDir) {
            if (!running) return;
            if (newDir.x === -dir.x && newDir.y === -dir.y) return; // no reverse
            dir = newDir;
        }

        function setupControls() {
            document.getElementById('start').onclick = toggle;
            document.getElementById('reset').onclick = () => { running=false; clearInterval(interval); reset(); };

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); toggle(); }
                if (['ArrowUp','w','W'].includes(e.key)) changeDir({x:0,y:-1});
                if (['ArrowDown','s','S'].includes(e.key)) changeDir({x:0,y:1});
                if (['ArrowLeft','a','A'].includes(e.key)) changeDir({x:-1,y:0});
                if (['ArrowRight','d','D'].includes(e.key)) changeDir({x:1,y:0});
                if (e.key.toLowerCase() === 'r') { running=false; clearInterval(interval); reset(); }
            });

            // mobile swipe support
            let touchStart = null;
            canvas.addEventListener('touchstart', e => { touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY}; });
            canvas.addEventListener('touchend', e => {
                if (!touchStart) return;
                const dx = e.changedTouches[0].clientX - touchStart.x;
                const dy = e.changedTouches[0].clientY - touchStart.y;
                if (Math.abs(dx) > Math.abs(dy)) {
                    changeDir(dx > 0 ? {x:1,y:0} : {x:-1,y:0});
                } else {
                    changeDir(dy > 0 ? {x:0,y:1} : {x:0,y:-1});
                }
                touchStart = null;
            });
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            if (theme === 'light') { html.classList.add('light'); if(btn) btn.textContent='DARK'; }
            else { html.classList.remove('light'); if(btn) btn.textContent='LIGHT'; }
            localStorage.setItem('daitya-theme', theme);
        }
        function initTheme() {
            const btn = document.getElementById('theme-toggle');
            let saved = localStorage.getItem('daitya-theme') || (window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark');
            applyTheme(saved);
            if (btn) btn.addEventListener('click', () => {
                const isL = document.documentElement.classList.contains('light');
                applyTheme(isL ? 'dark' : 'light');
            });
        }

        function init() {
            initTheme();
            loadHigh();
            reset();
            setupControls();
            draw();
            console.log('%c[SNAKE-13] Snake Engine online.', 'color:#52525b');
        }
        window.onload = init;
    </script>
</body>
</html>
