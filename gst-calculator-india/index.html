<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator India 2025 (All Slabs) - Forward &amp; Reverse | Free | DaityaAI</title>
    <meta name="description" content="Free GST Calculator India 2025. Supports 5%, 12%, 18%, 28% slabs. Instant CGST/SGST/IGST split for intra and inter state. Forward and reverse calculation.">
    <meta property="og:title" content="Free GST Calculator India | All Slabs + Split">
    <meta property="og:description" content="Accurate free GST calculator for India. Calculate tax on invoices with correct slab and split instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../diatya-ai-icon.svg">
    <style>
        :root { --bg:#000000; --panel:#1c1c1e; --surface:#2c2c2e; --text:#f5f5f7; --text-muted:#8e8e93; --accent:#0a84ff; --success:#30d158; --border:#38383a; --font-mono:'IBM Plex Mono',ui-monospace,monospace; --font-body:'Instrument Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif; }
        html.light { --bg:#f2f2f7; --panel:#ffffff; --surface:#ffffff; --text:#000000; --text-muted:#6e6e73; --accent:#007aff; --success:#34c759; --border:#c6c6c8; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); padding:24px 16px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .instrument { width:100%; max-width:380px; background:var(--panel); border:1px solid var(--border); border-radius:24px; overflow:hidden; box-shadow:0 20px 50px-12px rgba(0,0,0,0.35); }
        .instrument-header { font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; padding:12px 18px; background:color-mix(in srgb, var(--panel)95%,transparent); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; text-transform:uppercase; }
        .theme-toggle { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; background:none; border:1px solid var(--border); color:var(--text-muted); padding:2px 8px; border-radius:6px; cursor:pointer; text-transform:uppercase; }
        .status { display:flex; align-items:center; gap:6px; color:var(--success); }
        .status-dot { width:6px; height:6px; background:var(--success); border-radius:50%; }
        .inps { padding:14px 18px 6px; background:var(--bg); display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .field label { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:3px; }
        .field input, .field select { font-family:var(--font-mono); font-size:14px; width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:10px; }
        .out { padding:14px 18px; background:var(--bg); border-bottom:1px solid var(--border); }
        .row { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
        .row .l { color:var(--text-muted); }
        .row .v { font-family:var(--font-mono); font-weight:600; }
        .big { font-size:20px; color:var(--accent); }
        .footer { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-align:center; padding-top:20px; }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div style="display:flex;align-items:center;gap:8px;">
                <a href="../index.html"><img src="../diatya-ai-icon.svg" alt="DaityaAI" style="height:28px;width:auto;vertical-align:middle;"></a>
                <span><span style="color:var(--accent)">GST-INDIA-40</span> / GST CALCULATOR 2025</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="status"><span class="status-dot"></span><span>OPERATIONAL</span></div>
                <button id="theme-toggle" class="theme-toggle">LIGHT</button>
            </div>
        </div>

        <div class="inps">
            <div class="field"><label>AMOUNT (₹)</label><input id="amt" type="number" value="100000"></div>
            <div class="field"><label>MODE</label><select id="mode"><option value="forward">FORWARD (Base → Total)</option><option value="reverse">REVERSE (Total → Base)</option></select></div>
            <div class="field"><label>GST RATE</label><select id="rate"><option value="5">5%</option><option value="12" selected>12%</option><option value="18">18%</option><option value="28">28%</option></select></div>
            <div class="field"><label>TYPE</label><select id="type"><option value="intra">Intra-State (CGST+SGST)</option><option value="inter">Inter-State (IGST)</option></select></div>
        </div>

        <div class="out">
            <div class="row"><div class="l">BASE VALUE</div><div id="base" class="v">—</div></div>
            <div class="row"><div class="l">GST AMOUNT</div><div id="gst" class="v">—</div></div>
            <div class="row"><div class="l" id="split-label">CGST / SGST</div><div id="split" class="v">—</div></div>
            <div class="row big"><div class="l">TOTAL INVOICE</div><div id="total" class="v">—</div></div>
        </div>
    </div>
    <div class="footer">DAITYA AI ACADEMY • SPECIMEN-40 • LEARN. BUILD. LAUNCH.</div>

    <script>
        function calc() {
            const amt = parseFloat(document.getElementById('amt').value) || 0;
            const mode = document.getElementById('mode').value;
            const rate = parseFloat(document.getElementById('rate').value) / 100;
            const type = document.getElementById('type').value;

            let base, gst, total;
            if (mode === 'forward') {
                base = amt;
                gst = base * rate;
                total = base + gst;
            } else {
                total = amt;
                base = total / (1 + rate);
                gst = total - base;
            }

            document.getElementById('base').textContent = '₹' + base.toFixed(2);
            document.getElementById('gst').textContent = '₹' + gst.toFixed(2);
            document.getElementById('total').textContent = '₹' + total.toFixed(2);

            const splitLabel = document.getElementById('split-label');
            const splitEl = document.getElementById('split');
            if (type === 'intra') {
                splitLabel.textContent = 'CGST / SGST';
                const half = gst / 2;
                splitEl.textContent = '₹' + half.toFixed(2) + ' / ₹' + half.toFixed(2);
            } else {
                splitLabel.textContent = 'IGST';
                splitEl.textContent = '₹' + gst.toFixed(2);
            }
        }

        function setup() {
            ['amt','mode','rate','type'].forEach(id => document.getElementById(id).addEventListener('input', calc));
            calc();
        }

        function applyTheme(th) {
            const h = document.documentElement;
            const b = document.getElementById('theme-toggle');
            if (th==='light') { h.classList.add('light'); if(b) b.textContent='DARK'; } else { h.classList.remove('light'); if(b) b.textContent='LIGHT'; }
            localStorage.setItem('daitya-theme', th);
        }
        function initTheme() {
            const b = document.getElementById('theme-toggle');
            let s = localStorage.getItem('daitya-theme') || (matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark');
            applyTheme(s);
            if (b) b.addEventListener('click', () => applyTheme(document.documentElement.classList.contains('light') ? 'dark' : 'light'));
        }

        function init() { initTheme(); setup(); }
        window.onload = init;
    </script>
</body>
</html>
