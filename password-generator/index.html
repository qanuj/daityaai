<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASSGEN-30 — DAITYA AI ACADEMY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../diatya-ai-icon.svg">
    <style>
        :root { --bg:#000000; --panel:#1c1c1e; --surface:#2c2c2e; --text:#f5f5f7; --text-muted:#8e8e93; --accent:#0a84ff; --success:#30d158; --border:#38383a; --font-mono:'IBM Plex Mono',ui-monospace,monospace; --font-body:'Instrument Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif; }
        html.light { --bg:#f2f2f7; --panel:#ffffff; --surface:#ffffff; --text:#000000; --text-muted:#6e6e73; --accent:#007aff; --success:#34c759; --border:#c6c6c8; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); padding:24px 16px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .instrument { width:100%; max-width:380px; background:var(--panel); border:1px solid var(--border); border-radius:24px; overflow:hidden; box-shadow:0 20px 50px-12px rgba(0,0,0,0.35); }
        .instrument-header { font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; padding:12px 18px; background:color-mix(in srgb, var(--panel)95%,transparent); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; text-transform:uppercase; }
        .theme-toggle { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; background:none; border:1px solid var(--border); color:var(--text-muted); padding:2px 8px; border-radius:6px; cursor:pointer; text-transform:uppercase; }
        .display { padding:18px; background:var(--bg); border-bottom:1px solid var(--border); }
        .pw { font-family:var(--font-mono); font-size:15px; background:var(--surface); border:1px solid var(--border); padding:14px; border-radius:12px; word-break:break-all; min-height:48px; }
        .opts { padding:14px 18px; background:var(--bg); border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:8px; }
        .opt { display:flex; align-items:center; justify-content:space-between; font-family:var(--font-mono); font-size:10px; }
        .slider { accent-color:var(--accent); }
        .controls { padding:14px 18px 16px; background:var(--bg); display:flex; gap:8px; }
        .btn { flex:1; font-family:var(--font-mono); font-size:11px; padding:10px 0; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; }
        .btn.primary { background:color-mix(in srgb, var(--surface) 60%, var(--accent) 22%); border-color:var(--accent); }
        .footer { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-align:center; padding-top:18px; }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div style="display:flex;align-items:center;gap:8px;">
                <a href="../index.html"><img src="../diatya-ai-icon.svg" alt="DaityaAI" style="height:28px;width:auto;vertical-align:middle;"></a>
                <span><span style="color:var(--accent)">PASSGEN-30</span> / ENTROPY ENGINE</span>
            </div>
            <button id="theme-toggle" class="theme-toggle">LIGHT</button>
        </div>
        <div class="display"><div id="pw" class="pw" style="min-height:52px;"></div></div>
        <div class="opts">
            <div class="opt"><label>LENGTH</label><input id="len" type="range" min="8" max="32" value="16" class="slider"><span id="lenv" style="font-family:var(--font-mono);width:28px;text-align:right;">16</span></div>
            <div class="opt"><label>UPPERCASE</label><input id="upper" type="checkbox" checked></div>
            <div class="opt"><label>NUMBERS</label><input id="num" type="checkbox" checked></div>
            <div class="opt"><label>SYMBOLS</label><input id="sym" type="checkbox" checked></div>
        </div>
        <div class="controls">
            <button id="gen" class="btn primary">GENERATE</button>
            <button id="copy" class="btn">COPY</button>
        </div>
    </div>
    <div class="footer">DAITYA AI ACADEMY • SPECIMEN-30 • LEARN. BUILD. LAUNCH.</div>

    <script>
        function gen() {
            const len = +document.getElementById('len').value;
            const u = document.getElementById('upper').checked;
            const n = document.getElementById('num').checked;
            const s = document.getElementById('sym').checked;
            let chars = 'abcdefghijklmnopqrstuvwxyz';
            if (u) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (n) chars += '0123456789';
            if (s) chars += '!@#$%^&*()-_=+[]{};:,.<>?';
            let out = '';
            for (let i=0; i<len; i++) out += chars[Math.floor(Math.random()*chars.length)];
            document.getElementById('pw').textContent = out;
        }
        function init() {
            document.getElementById('gen').onclick = gen;
            document.getElementById('copy').onclick = () => { const t = document.getElementById('pw').textContent; if (t) navigator.clipboard.writeText(t); };
            ['len','upper','num','sym'].forEach(id => document.getElementById(id).oninput = gen);
            document.getElementById('len').oninput = () => document.getElementById('lenv').textContent = document.getElementById('len').value;
            const btn = document.getElementById('theme-toggle');
            let s = localStorage.getItem('daitya-theme') || (matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
            const a = t => { document.documentElement.classList.toggle('light',t==='light'); btn.textContent = t==='light'?'DARK':'LIGHT'; localStorage.setItem('daitya-theme',t); };
            a(s); btn.onclick = () => a(document.documentElement.classList.contains('light')?'dark':'light');
            gen();
        }
        window.onload = init;
    </script>
</body>
</html>
