<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI-08 — DAITYA AI ACADEMY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../diatya-ai-icon.svg">
    <style>
        :root { --bg:#000000; --panel:#1c1c1e; --surface:#2c2c2e; --paper:#2c2c2e; --text:#f5f5f7; --text-muted:#8e8e93; --accent:#0a84ff; --accent-warm:#ff9f0a; --success:#30d158; --border:#38383a; --font-mono:'IBM Plex Mono',ui-monospace,monospace; --font-body:'Instrument Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif; --radius:18px; }
        html.light { --bg:#f2f2f7; --panel:#ffffff; --surface:#ffffff; --paper:#ffffff; --text:#000000; --text-muted:#6e6e73; --accent:#007aff; --accent-warm:#ff9500; --success:#34c759; --border:#c6c6c8; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); padding:24px 16px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .instrument { width:100%; max-width:380px; background:var(--panel); border:1px solid var(--border); border-radius:24px; overflow:hidden; box-shadow:0 20px 50px-12px rgba(0,0,0,0.35); }
        .instrument-header { font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; padding:12px 18px; background:color-mix(in srgb,var(--panel)95%,transparent); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; text-transform:uppercase; }
        .theme-toggle { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; background:none; border:1px solid var(--border); color:var(--text-muted); padding:2px 8px; border-radius:6px; cursor:pointer; text-transform:uppercase; }
        .status { display:flex; align-items:center; gap:6px; color:var(--success); }
        .status-dot { width:6px; height:6px; background:var(--success); border-radius:50%; box-shadow:0 0 0 2px rgba(48,209,88,.25); }
        .unit-row { display:flex; gap:6px; padding:14px 18px 8px; background:var(--bg); border-bottom:1px solid var(--border); }
        .unit-btn { flex:1; font-family:var(--font-mono); font-size:10px; letter-spacing:1px; padding:7px 0; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; }
        .unit-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .inputs { padding:16px 18px 10px; background:var(--bg); display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .field label { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:4px; }
        .field input { font-family:var(--font-mono); width:100%; font-size:15px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:10px; }
        .display { padding:18px 20px 16px; background:var(--bg); border-bottom:1px solid var(--border); text-align:center; }
        .bmi-num { font-family:var(--font-mono); font-size:52px; font-weight:600; letter-spacing:-1.5px; color:var(--accent); line-height:1; }
        .cat-pill { display:inline-block; margin-top:6px; font-family:var(--font-mono); font-size:10px; letter-spacing:1px; padding:3px 11px; border-radius:999px; border:1px solid var(--border); }
        .cat-under { color:#3b82f6; border-color:#3b82f6; }
        .cat-normal { color:var(--success); border-color:var(--success); }
        .cat-over { color:var(--accent-warm); border-color:var(--accent-warm); }
        .cat-obese { color:#ef4444; border-color:#ef4444; }
        .range { margin-top:14px; font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
        .range .val { color:var(--text); }
        .advice { padding:12px 18px; background:var(--surface); font-size:12.5px; line-height:1.4; color:var(--text-muted); border-top:1px solid var(--border); }
        .footer { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-align:center; padding-top:20px; }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div style="display:flex; align-items:center; gap:8px;">
                <a href="../index.html" title="DaityaAI Home"><img src="../diatya-ai-icon.svg" alt="DaityaAI" style="height:28px; width:auto; vertical-align:middle;"></a>
                <span><span style="color:var(--accent)">BMI-08</span> / SOMATIC INDEX</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="status"><span class="status-dot"></span><span>OPERATIONAL</span></div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">LIGHT</button>
            </div>
        </div>

        <div class="unit-row">
            <button id="h-cm" class="unit-btn active" data-type="h" data-val="cm">HEIGHT CM</button>
            <button id="h-ft" class="unit-btn" data-type="h" data-val="ft">HEIGHT FT+IN</button>
            <button id="w-kg" class="unit-btn active" data-type="w" data-val="kg">WEIGHT KG</button>
            <button id="w-lb" class="unit-btn" data-type="w" data-val="lb">WEIGHT LB</button>
        </div>

        <div class="inputs">
            <div class="field" id="h-cm-wrap">
                <label>HEIGHT (CM)</label>
                <input id="height-cm" type="number" value="172" step="0.1">
            </div>
            <div class="field" id="h-ft-wrap" style="display:none; grid-template-columns:1fr 1fr; gap:6px;">
                <div><label>FEET</label><input id="height-ft" type="number" value="5" min="1" max="8"></div>
                <div><label>INCHES</label><input id="height-in" type="number" value="8" min="0" max="11" step="0.1"></div>
            </div>
            <div class="field">
                <label id="w-label">WEIGHT (KG)</label>
                <input id="weight" type="number" value="68" step="0.1">
            </div>
        </div>

        <div class="display">
            <div class="bmi-num" id="bmi">23.0</div>
            <div id="category" class="cat-pill cat-normal">NORMAL WEIGHT</div>
            <div class="range">IDEAL RANGE FOR YOUR HEIGHT: <span id="ideal" class="val">58 – 78 kg</span></div>
        </div>

        <div class="advice" id="advice">You are in the healthy range. Maintain with balanced nutrition and consistent movement.</div>
    </div>

    <div class="footer">
        DAITYA AI ACADEMY • SPECIMEN-08 • LEARN. BUILD. LAUNCH.
    </div>

    <script>
        let hUnit = 'cm', wUnit = 'kg';

        const bmiEl = document.getElementById('bmi');
        const catEl = document.getElementById('category');
        const idealEl = document.getElementById('ideal');
        const adviceEl = document.getElementById('advice');

        function getHeightM() {
            if (hUnit === 'cm') {
                const cm = parseFloat(document.getElementById('height-cm').value) || 0;
                return cm / 100;
            } else {
                const ft = parseFloat(document.getElementById('height-ft').value) || 0;
                const inch = parseFloat(document.getElementById('height-in').value) || 0;
                return (ft * 30.48 + inch * 2.54) / 100;
            }
        }
        function getWeightKg() {
            const w = parseFloat(document.getElementById('weight').value) || 0;
            return wUnit === 'kg' ? w : w * 0.453592;
        }

        function update() {
            const h = getHeightM();
            const w = getWeightKg();
            if (h < 0.8 || w < 10) { bmiEl.textContent = '—'; catEl.textContent = 'ENTER VALID DATA'; catEl.className='cat-pill'; return; }

            const bmi = w / (h * h);
            bmiEl.textContent = bmi.toFixed(1);

            let cat = '', cls = '', advice = '', low = 18.5 * h*h, high = 24.9 * h*h;

            if (bmi < 18.5) { cat = 'UNDERWEIGHT'; cls = 'cat-under'; advice = 'Consider nutrient-dense meals and strength training. Consult a professional if concerned.'; }
            else if (bmi < 25) { cat = 'NORMAL WEIGHT'; cls = 'cat-normal'; advice = 'Excellent. Keep moving daily and eating whole foods.'; }
            else if (bmi < 30) { cat = 'OVERWEIGHT'; cls = 'cat-over'; advice = 'Small consistent deficit + 8k+ steps can shift this quickly.'; }
            else { cat = 'OBESE'; cls = 'cat-obese'; advice = 'Medical guidance recommended. Start with daily walks and portion awareness.'; }

            catEl.textContent = cat; catEl.className = 'cat-pill ' + cls;
            idealEl.textContent = low.toFixed(0) + ' – ' + high.toFixed(0) + ' kg';
            adviceEl.textContent = advice;
        }

        function setupUnits() {
            document.querySelectorAll('.unit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const t = btn.dataset.type, v = btn.dataset.val;
                    if (t === 'h') {
                        hUnit = v;
                        document.getElementById('h-cm').classList.toggle('active', v==='cm');
                        document.getElementById('h-ft').classList.toggle('active', v==='ft');
                        document.getElementById('h-cm-wrap').style.display = v==='cm' ? '' : 'none';
                        document.getElementById('h-ft-wrap').style.display = v==='ft' ? 'grid' : 'none';
                    } else {
                        wUnit = v;
                        document.getElementById('w-kg').classList.toggle('active', v==='kg');
                        document.getElementById('w-lb').classList.toggle('active', v==='lb');
                        document.getElementById('w-label').textContent = v==='kg' ? 'WEIGHT (KG)' : 'WEIGHT (LB)';
                    }
                    update();
                });
            });

            ['height-cm','height-ft','height-in','weight'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', update);
            });
        }

        function applyTheme(th) { const h=document.documentElement, b=document.getElementById('theme-toggle'); if(th==='light'){h.classList.add('light');if(b)b.textContent='DARK';}else{h.classList.remove('light');if(b)b.textContent='LIGHT';} localStorage.setItem('daitya-theme',th); }
        function initTheme(){ const b=document.getElementById('theme-toggle'); let s=localStorage.getItem('daitya-theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'); applyTheme(s); if(b)b.addEventListener('click',()=>{const l=document.documentElement.classList.contains('light');applyTheme(l?'dark':'light');}); }

        function init(){ initTheme(); setupUnits(); update(); console.log('%c[BMI-08] Somatic Index online.', 'color:#52525b'); }
        window.onload = init;
    </script>
</body>
</html>
