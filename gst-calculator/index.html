<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST-11 — DAITYA AI ACADEMY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../diatya-ai-icon.svg">
    <style>
        :root { --bg:#000000; --panel:#1c1c1e; --surface:#2c2c2e; --paper:#2c2c2e; --text:#f5f5f7; --text-muted:#8e8e93; --accent:#0a84ff; --accent-warm:#ff9f0a; --success:#30d158; --border:#38383a; --font-mono:'IBM Plex Mono',ui-monospace,monospace; --font-body:'Instrument Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif; --radius:18px; }
        html.light { --bg:#f2f2f7; --panel:#ffffff; --surface:#ffffff; --paper:#ffffff; --text:#000000; --text-muted:#6e6e73; --accent:#007aff; --accent-warm:#ff9500; --success:#34c759; --border:#c6c6c8; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); padding:24px 16px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .instrument { width:100%; max-width:380px; background:var(--panel); border:1px solid var(--border); border-radius:24px; overflow:hidden; box-shadow:0 20px 50px-12px rgba(0,0,0,0.35); }
        .instrument-header { font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; padding:12px 18px; background:color-mix(in srgb,var(--panel)95%,transparent); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; text-transform:uppercase; }
        .theme-toggle { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; background:none; border:1px solid var(--border); color:var(--text-muted); padding:2px 8px; border-radius:6px; cursor:pointer; text-transform:uppercase; }
        .status { display:flex; align-items:center; gap:6px; color:var(--success); }
        .status-dot { width:6px; height:6px; background:var(--success); border-radius:50%; box-shadow:0 0 0 2px rgba(48,209,88,.25); }
        .mode { padding:10px 16px 6px; background:var(--bg); border-bottom:1px solid var(--border); display:flex; gap:6px; }
        .mbtn { flex:1; font-family:var(--font-mono); font-size:10px; letter-spacing:1px; padding:6px 0; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; }
        .mbtn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .presets { padding:10px 16px 4px; background:var(--bg); display:flex; flex-wrap:wrap; gap:6px; }
        .rate-pill { font-family:var(--font-mono); font-size:11px; padding:5px 11px; border-radius:999px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; }
        .rate-pill.active { border-color:var(--accent); color:var(--accent); }
        .in { padding:14px 18px 8px; background:var(--bg); }
        .in label { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:4px; }
        .in input { font-family:var(--font-mono); font-size:16px; width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:10px; }
        .out { padding:14px 18px; background:var(--bg); border-top:1px solid var(--border); }
        .line { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
        .line .v { font-family:var(--font-mono); font-weight:600; }
        .bigline { font-size:17px; margin-top:4px; }
        .bigline .v { color:var(--accent); }
        .footer { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-align:center; padding-top:20px; }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div style="display:flex;align-items:center;gap:8px;">
                <a href="../index.html" title="DaityaAI Home"><img src="../diatya-ai-icon.svg" alt="DaityaAI" style="height:28px;width:auto;vertical-align:middle;"></a>
                <span><span style="color:var(--accent)">GST-11</span> / TAX PRECISION</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="status"><span class="status-dot"></span><span>OPERATIONAL</span></div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">LIGHT</button>
            </div>
        </div>

        <div class="mode">
            <button id="fwd" class="mbtn active">FORWARD (BASE → TAX)</button>
            <button id="rev" class="mbtn">REVERSE (INCL → BASE)</button>
        </div>

        <div class="presets" id="rates">
            <div class="rate-pill" data-r="5">5%</div>
            <div class="rate-pill active" data-r="12">12%</div>
            <div class="rate-pill" data-r="18">18%</div>
            <div class="rate-pill" data-r="28">28%</div>
            <div class="rate-pill" data-r="cust">CUSTOM</div>
        </div>

        <div class="in">
            <label id="amt-label">BASE AMOUNT (₹)</label>
            <input id="amt" type="number" value="100000" step="100">
            <div id="cust-row" style="display:none;margin-top:8px;">
                <label>CUSTOM RATE %</label>
                <input id="cust" type="number" value="18" step="0.5">
            </div>
        </div>

        <div class="out">
            <div class="line"><div>GST AMOUNT</div><div id="gst" class="v">—</div></div>
            <div class="line"><div>CGST / SGST (50%)</div><div id="split" class="v">—</div></div>
            <div class="line bigline"><div>TOTAL</div><div id="total" class="v">—</div></div>
            <div id="base-note" style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);margin-top:6px;"></div>
        </div>
    </div>

    <div class="footer">
        DAITYA AI ACADEMY • SPECIMEN-11 • LEARN. BUILD. LAUNCH.
    </div>

    <script>
        let mode = 'fwd', rate = 12;

        function getRate() {
            if (rate === 'cust') return parseFloat(document.getElementById('cust').value) || 0;
            return rate;
        }

        function calc() {
            const amt = parseFloat(document.getElementById('amt').value) || 0;
            const r = getRate() / 100;
            if (amt <= 0 || r <= 0) { clear(); return; }

            let base, gst, total;
            if (mode === 'fwd') {
                base = amt; gst = base * r; total = base + gst;
                document.getElementById('base-note').textContent = '';
            } else {
                total = amt; base = total / (1 + r); gst = total - base;
                document.getElementById('base-note').textContent = 'Base extracted from inclusive amount';
            }

            const half = gst / 2;
            document.getElementById('gst').textContent = '₹' + gst.toFixed(2);
            document.getElementById('split').textContent = '₹' + half.toFixed(2) + ' / ₹' + half.toFixed(2);
            document.getElementById('total').textContent = '₹' + total.toFixed(2);
        }

        function clear(){ ['gst','split','total'].forEach(id=>document.getElementById(id).textContent='—'); document.getElementById('base-note').textContent=''; }

        function setup() {
            document.querySelectorAll('#rates .rate-pill').forEach(p => {
                p.onclick = () => {
                    document.querySelectorAll('#rates .rate-pill').forEach(x=>x.classList.remove('active'));
                    p.classList.add('active');
                    const v = p.dataset.r;
                    rate = (v==='cust') ? 'cust' : parseFloat(v);
                    document.getElementById('cust-row').style.display = (v==='cust') ? 'block' : 'none';
                    calc();
                };
            });
            document.getElementById('cust').oninput = calc;
            document.getElementById('amt').oninput = calc;

            document.getElementById('fwd').onclick = () => { mode='fwd'; document.getElementById('fwd').classList.add('active'); document.getElementById('rev').classList.remove('active'); document.getElementById('amt-label').textContent='BASE AMOUNT (₹)'; calc(); };
            document.getElementById('rev').onclick = () => { mode='rev'; document.getElementById('rev').classList.add('active'); document.getElementById('fwd').classList.remove('active'); document.getElementById('amt-label').textContent='INCLUSIVE TOTAL (₹)'; calc(); };

            calc();
        }

        function applyTheme(th){const h=document.documentElement,b=document.getElementById('theme-toggle');if(th==='light'){h.classList.add('light');if(b)b.textContent='DARK';}else{h.classList.remove('light');if(b)b.textContent='LIGHT';}localStorage.setItem('daitya-theme',th);}
        function initTheme(){const b=document.getElementById('theme-toggle');let s=localStorage.getItem('daitya-theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');applyTheme(s);if(b)b.addEventListener('click',()=>{const l=document.documentElement.classList.contains('light');applyTheme(l?'dark':'light');});}

        function init(){initTheme();setup(); console.log('%c[GST-11] Tax Precision online.', 'color:#52525b');}
        window.onload=init;
    </script>
</body>
</html>
