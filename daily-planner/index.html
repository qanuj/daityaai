<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANNER-06 — DAITYA AI ACADEMY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../diatya-ai-icon.svg">
    <style>
        :root {
            --bg: #000000; --panel: #1c1c1e; --surface: #2c2c2e; --paper: #2c2c2e;
            --text: #f5f5f7; --text-muted: #8e8e93; --accent: #0a84ff; --accent-warm: #ff9f0a;
            --success: #30d158; --border: #38383a;
            --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
            --font-body: 'Instrument Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            --radius: 18px;
        }
        html.light {
            --bg: #f2f2f7; --panel: #ffffff; --surface: #ffffff; --paper: #ffffff;
            --text: #000000; --text-muted: #6e6e73; --accent: #007aff; --accent-warm: #ff9500;
            --success: #34c759; --border: #c6c6c8;
        }
        body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body); padding:24px 16px; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .instrument { width:100%; max-width:480px; background:var(--panel); border:1px solid var(--border); border-radius:24px; overflow:hidden; box-shadow:0 20px 50px -12px rgba(0,0,0,0.35); }
        .instrument-header { font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; padding:12px 18px; background:color-mix(in srgb, var(--panel) 95%, transparent); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; text-transform:uppercase; }
        .theme-toggle { font-family:var(--font-mono); font-size:9px; letter-spacing:1px; background:none; border:1px solid var(--border); color:var(--text-muted); padding:2px 8px; border-radius:6px; cursor:pointer; text-transform:uppercase; }
        .status { display:flex; align-items:center; gap:6px; color:var(--success); }
        .status-dot { width:6px; height:6px; background:var(--success); border-radius:50%; box-shadow:0 0 0 2px rgba(48,209,88,.25); }
        .add-form { padding:14px 18px; background:var(--bg); border-bottom:1px solid var(--border); display:grid; grid-template-columns: 68px 1fr 42px; gap:8px; align-items:center; }
        .time-input { font-family:var(--font-mono); font-size:13px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:9px 10px; border-radius:10px; }
        .title-input { font-family:var(--font-body); font-size:14px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:10px; }
        .add-btn { font-family:var(--font-mono); font-size:12px; padding:9px 0; border-radius:10px; border:1px solid var(--accent); background:color-mix(in srgb,var(--surface)70%,var(--accent)18%); color:var(--text); cursor:pointer; font-weight:600; }
        .list { background:var(--bg); max-height:340px; overflow:auto; }
        .entry { display:flex; align-items:flex-start; gap:12px; padding:11px 18px; border-bottom:1px solid var(--border); }
        .entry:last-child { border-bottom:none; }
        .entry.done .title { text-decoration:line-through; opacity:.55; }
        .time { font-family:var(--font-mono); font-size:13px; color:var(--accent); min-width:52px; padding-top:3px; letter-spacing:0.3px; }
        .title { flex:1; font-size:14.2px; line-height:1.35; }
        .note { font-size:12px; color:var(--text-muted); margin-top:2px; }
        .actions { display:flex; gap:4px; padding-top:2px; }
        .icon-btn { width:26px; height:26px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); cursor:pointer; border-radius:6px; font-size:12px; }
        .icon-btn:hover { color:var(--text); background:var(--surface); }
        .icon-btn.done { color:var(--success); }
        .empty { padding:28px 18px; text-align:center; color:var(--text-muted); font-family:var(--font-mono); font-size:10px; letter-spacing:1px; }
        .summary { padding:10px 18px; background:var(--bg); border-top:1px solid var(--border); font-family:var(--font-mono); font-size:9px; color:var(--text-muted); letter-spacing:.5px; display:flex; justify-content:space-between; }
        .footer { font-family:var(--font-mono); font-size:8px; letter-spacing:1px; color:var(--text-muted); text-align:center; padding-top:20px; }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div style="display:flex; align-items:center; gap:8px;">
                <a href="../index.html" title="DaityaAI Home"><img src="../diatya-ai-icon.svg" alt="DaityaAI" style="height:28px; width:auto; vertical-align:middle;"></a>
                <span><span style="color:var(--accent)">PLANNER-06</span> / DIURNAL ORCHESTRA</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="status"><span class="status-dot"></span><span>OPERATIONAL</span></div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">LIGHT</button>
            </div>
        </div>

        <div class="add-form">
            <input id="time" type="time" class="time-input" value="09:00">
            <input id="title" class="title-input" placeholder="TASK OR APPOINTMENT..." maxlength="64">
            <button id="add" class="add-btn"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div id="list" class="list"></div>

        <div class="summary">
            <div><span id="done-count">0</span>/<span id="total-count">0</span> COMPLETE</div>
            <div>TODAY • LOCAL ONLY</div>
        </div>
    </div>

    <div class="footer">
        DAITYA AI ACADEMY • SPECIMEN-06 • LEARN. BUILD. LAUNCH.
    </div>

    <script>
        let entries = []; // {id, time:'09:00', title, note:'', done:false }

        const listEl = document.getElementById('list');
        const timeIn = document.getElementById('time');
        const titleIn = document.getElementById('title');
        const addBtn = document.getElementById('add');

        function load() {
            const raw = localStorage.getItem('daitya-planner');
            if (raw) entries = JSON.parse(raw);
            const today = new Date().toISOString().slice(0,10);
            // crude daily reset guard: if any entry has old meta, but keep simple — persist across days for now
            render();
        }
        function save() { localStorage.setItem('daitya-planner', JSON.stringify(entries)); }

        function render() {
            listEl.innerHTML = '';
            if (!entries.length) {
                const e = document.createElement('div'); e.className='empty'; e.textContent='NO ENTRIES. ADD YOUR DAY ABOVE.';
                listEl.appendChild(e); updateSummary(); return;
            }
            const sorted = [...entries].sort((a,b) => a.time.localeCompare(b.time));
            sorted.forEach((e, i) => {
                const origIdx = entries.findIndex(x => x.id === e.id);
                const row = document.createElement('div');
                row.className = 'entry' + (e.done ? ' done' : '');

                const tm = document.createElement('div'); tm.className='time'; tm.textContent = e.time;

                const mid = document.createElement('div');
                const t = document.createElement('div'); t.className='title'; t.textContent = e.title;
                mid.appendChild(t);
                if (e.note) { const n = document.createElement('div'); n.className='note'; n.textContent=e.note; mid.appendChild(n); }

                const acts = document.createElement('div'); acts.className='actions';
                const chk = document.createElement('div'); chk.className='icon-btn' + (e.done?' done':''); chk.innerHTML = e.done ? '<i class="fa-solid fa-check-double"></i>' : '<i class="fa-solid fa-check"></i>';
                chk.onclick = () => { entries[origIdx].done = !entries[origIdx].done; save(); render(); };
                const del = document.createElement('div'); del.className='icon-btn'; del.innerHTML='<i class="fa-solid fa-trash"></i>';
                del.onclick = () => { if(confirm('Remove entry?')) { entries.splice(origIdx,1); save(); render(); } };

                acts.appendChild(chk); acts.appendChild(del);
                row.append(tm, mid, acts);
                listEl.appendChild(row);
            });
            updateSummary();
        }

        function updateSummary() {
            const done = entries.filter(e=>e.done).length;
            document.getElementById('done-count').textContent = done;
            document.getElementById('total-count').textContent = entries.length;
        }

        function addEntry() {
            const t = timeIn.value || '09:00';
            const title = (titleIn.value || '').trim();
            if (!title) return;
            entries.push({ id: Date.now(), time: t, title, note: '', done: false });
            titleIn.value = '';
            save();
            render();
        }

        function setup() {
            addBtn.onclick = addEntry;
            titleIn.onkeydown = (e) => { if (e.key==='Enter') { e.preventDefault(); addEntry(); } };
            // allow time enter too
            timeIn.onkeydown = (e) => { if (e.key==='Enter') titleIn.focus(); };
            // quick / focus
            document.addEventListener('keydown', (e)=>{
                if (e.key==='/' && document.activeElement === document.body) { e.preventDefault(); titleIn.focus(); }
            });
        }

        function applyTheme(theme) {
            const html = document.documentElement; const btn = document.getElementById('theme-toggle');
            if (theme==='light'){ html.classList.add('light'); if(btn) btn.textContent='DARK'; }
            else { html.classList.remove('light'); if(btn) btn.textContent='LIGHT'; }
            localStorage.setItem('daitya-theme', theme);
        }
        function initTheme() {
            const btn = document.getElementById('theme-toggle');
            let saved = localStorage.getItem('daitya-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            applyTheme(saved);
            if (btn) btn.addEventListener('click', ()=>{ const isL = document.documentElement.classList.contains('light'); applyTheme(isL?'dark':'light'); });
        }

        function init() {
            initTheme(); load(); setup();
            if (entries.length===0 && !localStorage.getItem('daitya-planner-seed')) {
                const d = new Date().toISOString().slice(0,10);
                entries = [
                    {id:101, time:'07:30', title:'Morning ritual + movement', note:'', done:false},
                    {id:102, time:'09:00', title:'Deep work block — priority 1', note:'', done:false},
                    {id:103, time:'12:30', title:'Lunch + walk', note:'', done:false},
                ];
                localStorage.setItem('daitya-planner-seed','1');
                save(); render();
            }
            console.log('%c[PLANNER-06] Diurnal Orchestra online.', 'color:#52525b');
        }
        window.onload = init;
    </script>
</body>
</html>
