<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECTOR-03 — DAITYA AI ACADEMY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../diatya-ai-icon.svg">
    <style>
        :root {
            /* Apple elegant */
            --bg: #000000;
            --panel: #1c1c1e;
            --text: #f5f5f7;
            --text-muted: #8e8e93;
            --accent: #0a84ff;
            --accent-warm: #ff9f0a;
            --success: #30d158;
            --border: #38383a;
            --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
            --font-body: 'Instrument Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            --radius: 18px;
        }

        html.light {
            --bg: #f2f2f7;
            --panel: #ffffff;
            --text: #000000;
            --text-muted: #6e6e73;
            --accent: #007aff;
            --accent-warm: #ff9500;
            --success: #34c759;
            --border: #c6c6c8;
        }

        body {
            margin: 0;
            background: var(--bg);
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 18px 18px;
            color: var(--text);
            font-family: var(--font-body);
            padding: 24px 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .instrument {
            width: 100%;
            max-width: 480px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px -12px rgba(0,0,0,0.35);
        }

        .instrument-header {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1.5px;
            padding: 9px 14px 8px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
        }

        .theme-toggle {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 1px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 1px 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .input-row {
            padding: 14px 16px 10px;
            background: var(--bg);
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .input-row input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            border-radius: 12px;
        }

        .input-row input:focus {
            border-color: var(--accent);
        }

        .input-row button {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.5px;
            padding: 0 20px;
            background: var(--accent);
            color: white;
            border: none;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
        }

        .filter-bar {
            display: flex;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .filter-bar button {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 1px;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
        }

        .filter-bar button.active {
            background: var(--surface);
            color: var(--text);
            border-bottom: 2px solid var(--accent);
        }

        .ledger {
            padding: 8px;
            background: var(--bg);
            min-height: 280px;
            max-height: 420px;
            overflow-y: auto;
        }

        .ledger-line {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            font-size: 13.5px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            border-radius: 10px;
            margin: 2px 0;
        }

        .ledger-line:last-child {
            border-bottom: none;
        }

        .ledger-line.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .check {
            width: 16px;
            height: 16px;
            border: 1px solid var(--border);
            border-radius: 5px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: var(--success);
        }

        .check.checked {
            background: var(--success);
            border-color: var(--success);
            color: var(--bg);
        }

        .task-text {
            flex: 1;
            font-family: var(--font-mono);
            letter-spacing: 0.2px;
        }

        .actions {
            opacity: 0.2;
            display: flex;
            gap: 2px;
            transition: opacity 0.1s ease;
        }

        .ledger-line:hover .actions {
            opacity: 1;
        }

        .action-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 12px;
            border-radius: 6px;
        }

        .action-btn:hover {
            color: var(--accent);
            background: var(--surface);
        }

        .footer-bar {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 10px 16px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .empty {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            padding: 42px 0;
            letter-spacing: 1px;
        }

        .footer {
            font-family: var(--font-mono);
            font-size: 8px;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-align: center;
            padding-top: 14px;
        }
    </style>
</head>
<body>
    <div class="instrument">
        <div class="instrument-header">
            <div style="display: flex; align-items: center; gap: 8px;">
                <a href="../index.html" title="DaityaAI Home"><img src="../diatya-ai-icon.svg" alt="DaityaAI" style="height: 28px; width: auto; vertical-align: middle;"></a>
                <span><span style="color:var(--success)">VECTOR-03</span> / TASK LEDGER</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <div>REV 01 • PERSISTENT</div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">LIGHT</button>
            </div>
        </div>

        <!-- Add -->
        <div class="input-row">
            <input id="new-input" type="text" placeholder="NEW VECTOR ENTRY..." onkeydown="if(event.key==='Enter') addTask()">
            <button onclick="addTask()">LOG</button>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <button id="f-all" onclick="setFilter('all')" class="active">ALL</button>
            <button id="f-active" onclick="setFilter('active')">ACTIVE</button>
            <button id="f-completed" onclick="setFilter('completed')">COMPLETED</button>
        </div>

        <!-- Ledger -->
        <div class="ledger" id="ledger"></div>

        <!-- Footer -->
        <div class="footer-bar">
            <div id="remaining">0 VECTORS REMAINING</div>
            <button onclick="clearCompleted()" style="font-family:var(--font-mono); font-size:9px; background:none; border:none; color:#4ade80; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">CLEAR COMPLETED</button>
        </div>
    </div>

    <footer class="footer">
        DAITYA AI ACADEMY • SPECIMEN-03 • LEARN. BUILD. LAUNCH.
    </footer>

    <script>
        let tasks = [];
        let filter = 'all';
        let editingId = null;
        const STORAGE = 'vector03-ledger';

        function save() {
            localStorage.setItem(STORAGE, JSON.stringify(tasks));
        }

        function load() {
            const raw = localStorage.getItem(STORAGE);
            if (raw) {
                tasks = JSON.parse(raw);
            } else {
                const t = Date.now();
                tasks = [
                    { id: t-4000, text: "Initialize the field log", completed: true },
                    { id: t-3000, text: "Refine all specimen interfaces", completed: false },
                    { id: t-2000, text: "Test drag reordering on ledger", completed: false },
                    { id: t-1000, text: "Document the new aesthetic system", completed: false }
                ];
                save();
            }
        }

        function setFilter(f) {
            filter = f;
            document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + f).classList.add('active');
            render();
        }

        function render() {
            const ledger = document.getElementById('ledger');
            ledger.innerHTML = '';

            let visible = tasks;
            if (filter === 'active') visible = tasks.filter(t => !t.completed);
            if (filter === 'completed') visible = tasks.filter(t => t.completed);

            if (visible.length === 0) {
                const e = document.createElement('div');
                e.className = 'empty';
                e.textContent = filter === 'all' ? 'LEDGER EMPTY — LOG FIRST VECTOR' : 'NO ' + filter.toUpperCase() + ' VECTORS';
                ledger.appendChild(e);
                updateFooter();
                return;
            }

            visible.forEach(task => {
                const row = document.createElement('div');
                row.className = `ledger-line ${task.completed ? 'completed' : ''}`;
                row.dataset.id = task.id;

                const check = document.createElement('div');
                check.className = `check ${task.completed ? 'checked' : ''}`;
                check.innerHTML = task.completed ? '<i class="fa-solid fa-check"></i>' : '';
                check.onclick = (e) => { e.stopImmediatePropagation(); toggle(task.id); };

                const text = document.createElement('div');
                text.className = 'task-text';
                text.textContent = task.text;

                if (editingId === task.id) {
                    const inp = document.createElement('input');
                    inp.type = 'text';
                    inp.value = task.text;
                    inp.style.cssText = 'flex:1;background:#0a0a0a;border:1px solid var(--accent);font-family:var(--font-mono);font-size:13px;padding:2px 5px;color:var(--text);';
                    inp.onkeydown = (ev) => {
                        if (ev.key === 'Enter') saveEdit(task.id, inp.value);
                        if (ev.key === 'Escape') cancelEdit();
                    };
                    inp.onblur = () => saveEdit(task.id, inp.value);
                    text.replaceWith(inp);
                    setTimeout(() => inp.focus(), 10);
                } else {
                    text.ondblclick = () => startEdit(task.id);
                }

                const actions = document.createElement('div');
                actions.className = 'actions';

                const edit = document.createElement('button');
                edit.className = 'action-btn';
                edit.innerHTML = '<i class="fa-solid fa-pencil"></i>';
                edit.onclick = (e) => { e.stopImmediatePropagation(); startEdit(task.id); };

                const del = document.createElement('button');
                del.className = 'action-btn';
                del.innerHTML = '<i class="fa-solid fa-trash"></i>';
                del.onclick = (e) => { e.stopImmediatePropagation(); remove(task.id); };

                actions.append(edit, del);

                row.append(check, text, actions);
                ledger.appendChild(row);
            });

            updateFooter();
        }

        function updateFooter() {
            const rem = document.getElementById('remaining');
            const active = tasks.filter(t => !t.completed).length;
            rem.textContent = `${active} VECTOR${active === 1 ? '' : 'S'} REMAINING`;
        }

        function addTask() {
            const inp = document.getElementById('new-input');
            const val = inp.value.trim();
            if (!val) return;

            tasks.unshift({ id: Date.now(), text: val, completed: false });
            inp.value = '';
            save();
            render();
            inp.focus();
        }

        function toggle(id) {
            const t = tasks.find(x => x.id === id);
            if (t) {
                t.completed = !t.completed;
                if (editingId === id) editingId = null;
                save();
                render();
            }
        }

        function remove(id) {
            tasks = tasks.filter(x => x.id !== id);
            if (editingId === id) editingId = null;
            save();
            render();
        }

        function startEdit(id) {
            editingId = id;
            render();
        }

        function saveEdit(id, newText) {
            const t = tasks.find(x => x.id === id);
            const trimmed = (newText || '').trim();
            if (t && trimmed) t.text = trimmed;
            editingId = null;
            save();
            render();
        }

        function cancelEdit() {
            editingId = null;
            render();
        }

        function clearCompleted() {
            tasks = tasks.filter(t => !t.completed);
            save();
            render();
        }

        function setFilterAndRender(f) { setFilter(f); }

        // Drag & drop
        function enableDrag() {
            const ledger = document.getElementById('ledger');
            let draggedId = null;

            ledger.addEventListener('dragstart', (e) => {
                const row = e.target.closest('.ledger-line');
                if (!row) return;
                draggedId = parseInt(row.dataset.id);
                e.dataTransfer.effectAllowed = 'move';
            });

            ledger.addEventListener('dragover', (e) => {
                e.preventDefault();
                const row = e.target.closest('.ledger-line');
                if (row) row.style.borderTop = '1px solid var(--accent)';
            });

            ledger.addEventListener('dragleave', (e) => {
                const row = e.target.closest('.ledger-line');
                if (row) row.style.borderTop = '';
            });

            ledger.addEventListener('drop', (e) => {
                e.preventDefault();
                const row = e.target.closest('.ledger-line');
                if (!row || !draggedId) return;

                const targetId = parseInt(row.dataset.id);
                row.style.borderTop = '';

                const from = tasks.findIndex(t => t.id === draggedId);
                const to = tasks.findIndex(t => t.id === targetId);
                if (from === -1 || to === -1 || from === to) return;

                const [moved] = tasks.splice(from, 1);
                tasks.splice(to, 0, moved);
                save();
                render();
            });

            // Make rows draggable
            ledger.addEventListener('mousedown', (e) => {
                const row = e.target.closest('.ledger-line');
                if (row) row.draggable = true;
            });
        }

        function setupShortcuts() {
            const inp = document.getElementById('new-input');
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                    e.preventDefault();
                    inp.focus();
                }
                if (e.key === 'Escape' && document.activeElement === inp) inp.blur();
            });
        }

        // Theme toggle
        function applyTheme(theme) {
            const html = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            if (theme === 'light') {
                html.classList.add('light');
                if (btn) btn.textContent = 'DARK';
            } else {
                html.classList.remove('light');
                if (btn) btn.textContent = 'LIGHT';
            }
            localStorage.setItem('daitya-theme', theme);
        }
        function initTheme() {
            const btn = document.getElementById('theme-toggle');
            let saved = localStorage.getItem('daitya-theme');
            if (!saved) {
                saved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            }
            applyTheme(saved);
            if (btn) {
                btn.addEventListener('click', () => {
                    const isLight = document.documentElement.classList.contains('light');
                    applyTheme(isLight ? 'dark' : 'light');
                });
            }
        }

        function initLedger() {
            initTheme();
            load();
            render();
            enableDrag();
            setupShortcuts();

            const inp = document.getElementById('new-input');
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') addTask();
            });

            // initial filter
            document.getElementById('f-all').classList.add('active');

            console.log('%c[VECTOR-03] Task Ledger initialized. All vectors local.', 'color:#52525b');
        }

        window.onload = initLedger;
        window.__vector03 = { reset: () => { localStorage.removeItem('vector03-ledger'); location.reload(); } };
    </script>
</body>
</html>
